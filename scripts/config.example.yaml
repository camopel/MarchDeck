# March Deck configuration
# Generated by install.sh at ~/.march-deck/config.yaml

# ── Global ──
server:
  host: 0.0.0.0
  port: 8800

push:
  vapid_email: nobody@localhost

# ── LLM ──
# See README.md for all provider types and options.
llm:
  default: local
  providers:
    local:
      type: ollama
      endpoint: http://localhost:11434
      model: llama3
      temperature: 0.7
      streaming: true

# ── Apps (only list apps that need config) ──
apps:
  finviz:
    crawl_interval: 7200
  arxiv:
    embedding_model: nomic-embed-text
  files:
    root: /
    show_hidden: false
